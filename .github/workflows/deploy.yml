name: Deploy Java App to GCloud Run

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set GOOGLE_APPLICATION_CREDENTIALS
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > $HOME/gcloud-key.json

      - name: Build JAR with Gradle
        run: ./gradlew build

      - name: Build with Gradle
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/gcloud-key.json"
          ./gradlew build

      - name: Configure Docker to use Google Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest .
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.DOCKER_IMAGE_NAME }} \
            --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated

  deploy-sandbox:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      SANDBOX_SERVICE: ${{ secrets.DOCKER_IMAGE_NAME }}-pr-${{ github.event.pull_request.number }}
      SANDBOX_IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/${{ secrets.DOCKER_IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Build JAR with Gradle
        run: ./gradlew build

      - name: Configure Docker to use Google Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          docker build -t $SANDBOX_IMAGE .
          docker push $SANDBOX_IMAGE

      - name: Deploy sandbox to Cloud Run
        run: |
          gcloud run deploy $SANDBOX_SERVICE \
            --image $SANDBOX_IMAGE \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated

      - name: Print sandbox URL
        run: |
          URL=$(gcloud run services describe $SANDBOX_SERVICE --platform managed --region ${{ secrets.GCP_REGION }} --format 'value(status.url)')
          echo "Sandbox deployed at: $URL" >> "$GITHUB_STEP_SUMMARY"

  teardown-sandbox:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      SANDBOX_SERVICE: ${{ secrets.DOCKER_IMAGE_NAME }}-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Delete sandbox Cloud Run service
        run: |
          gcloud run services delete $SANDBOX_SERVICE \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --quiet || echo "Sandbox service $SANDBOX_SERVICE not found, nothing to delete."
